name: Build & Release

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: zulu
          java-version: "17"
          cache: gradle

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web-ui/package-lock.json

      - name: Install Web UI Dependencies
        run: |
          cd web-ui
          npm ci

      - name: Decode Keystore (if available)
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/keystore.jks
          else
            echo "No keystore secret found, will use debug signing"
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -f "app/keystore.jks" ]; then
            ./gradlew assembleRelease bundleRelease
          else
            ./gradlew assembleDebug
          fi

      - name: Collect outputs
        run: |
          mkdir outputs
          find . -type f \( -name "*.apk" -o -name "*.aab" \) \( -path "*/release/*" -o -path "*/debug/*" \) -exec cp {} outputs/ \;

      - name: Extract Signing Certificate Fingerprint
        run: |
          echo "Extracting SHA256 Fingerprint from Keystore..."
          keytool -list -v -keystore app/keystore.jks -alias "${{ secrets.KEY_ALIAS }}" -storepass "${{ secrets.KEYSTORE_PASSWORD }}" > outputs/certificate_full_details.txt
          
          # Extract just the SHA256 line for easy viewing
          echo "APK Signing Certificate SHA256 Fingerprint:" > outputs/SIGNING_CERTIFICATE_SHA256.txt
          grep "SHA256: " outputs/certificate_full_details.txt | cut -d " " -f 3 >> outputs/SIGNING_CERTIFICATE_SHA256.txt

      - name: Generate SHA256 checksums
        run: |
          cd outputs
          sha256sum * > SHA256SUMS.txt
          for f in *; do
            # Don't generate a checksum of a checksum file
            if [[ "$f" != *.sha256 && "$f" != "SHA256SUMS.txt" ]]; then
              sha256sum "$f" > "$f.sha256"
            fi
          done

      # Only run these steps if the push/PR is to the main branch
      - name: Delete old release and tag
        if: github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete preview --cleanup-tag -y || true

      - name: Publish Release
        if: github.ref == 'refs/heads/main'
        uses: ncipollo/release-action@v1
        with:
          tag: preview
          name: Preview Build
          commit: ${{ github.sha }}
          artifacts: outputs/*
          token: ${{ secrets.GITHUB_TOKEN }}
          prerelease: true
